services:
  db:
    image: mysql:8.0
    container_name: school_management_db
    restart: always
    environment:
      MYSQL_DATABASE: school_management
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
